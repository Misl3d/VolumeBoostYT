name: Build Tweak

on:
  workflow_dispatch: # This keeps the "Run workflow" button
    inputs:
      should_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build YTGestures
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install ldid xz

      - name: Setup Theos
        run: git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos

      - name: Setup iOS SDKs
        run: |
          rm -rf ${{ github.workspace }}/theos/sdks
          git clone https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks

      - name: Build Package
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          cp packages/*.deb output/
          
          # Use wildcards to find the plist and dylib regardless of case or minor name changes
          cp *.plist output/ 2>/dev/null || true
          
          # Find the dylib in the build folder - look for YTGestures.dylib
          if [ -f .theos/obj/YTGestures.dylib ]; then
            cp .theos/obj/YTGestures.dylib output/
          elif [ -f .theos/obj/debug/YTGestures.dylib ]; then
            cp .theos/obj/debug/YTGestures.dylib output/
          elif [ -d .theos/obj ]; then
             # Fallback: catch any dylib generated if the name differs slightly
             find .theos/obj -name "*.dylib" -exec cp {} output/ \;
          fi

      - name: Generate Release Tag
        id: tag
        run: |
          VERSION=$(grep '^Version:' control | awk '{print $2}')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: YTGestures ${{ steps.tag.outputs.version }}
          files: output/*
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
